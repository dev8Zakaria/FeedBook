<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>FeedBook — Sign In</title>
    <h:outputStylesheet name="css/feedbook.css" />
</h:head>
<h:body styleClass="fb-auth-bg">

    <div class="fb-auth-card">
        <div style="text-align:center; margin-bottom:28px;">
            <span style="font-family: var(--font-display); font-weight:800; font-size:1.6rem; letter-spacing:-0.02em;">
                Feed<span style="color:var(--accent);">Book</span>
            </span>
        </div>

        <h2 class="fb-auth-card__title">Welcome back</h2>
        <p class="fb-auth-card__subtitle">Sign in to continue to your feed.</p>

        <h:messages globalOnly="true" styleClass="fb-messages" />

        <h:form id="loginForm">
            <div class="fb-form-group">
                <label class="fb-label" for="email">Email Address</label>
                <h:inputText id="email" value="#{authBean.email}" required="true"
                             requiredMessage="Email is required" styleClass="fb-input" />
            </div>

            <div class="fb-form-group">
                <label class="fb-label" for="password">Password</label>
                <h:inputSecret id="password" value="#{authBean.password}" required="true"
                               requiredMessage="Password is required" styleClass="fb-input" />
            </div>

            <h:commandButton value="Sign In" action="#{authBean.doLogin}" styleClass="fb-btn fb-btn--primary fb-btn--block" />
        </h:form>

        <div class="fb-auth-card__footer">
            Don't have an account? <h:link outcome="register.xhtml" value="Create one now" />
        </div>
    </div>

</h:body>
</html>
