<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Create Group - FeedBook</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
    </style>
</h:head>
<h:body>
    <h2>Create New Group</h2>
    <h:link outcome="/groups/list.xhtml" value="&lt; Back to Groups" />
    <hr/>

    <h:messages globalOnly="true" style="color:red" />

    <h:form enctype="multipart/form-data">
        <p>
            <h:outputLabel value="Group Picture:" for="gPic" /><br/>
            <h:inputFile id="gPic" value="#{groupBean.newGroupImage}" onchange="previewImage(this)"/>
            <br/>
            <img id="preview" style="max-width: 150px; display: none; margin-top: 10px; border: 1px solid #ccc;"/>
        </p>

        <script>
            function previewImage(input) {
                var preview = document.getElementById('preview');
                if (input.files &amp;&amp; input.files[0]) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            }
        </script>
        <p>
            <h:outputLabel value="Group Name:" for="gName" /><br/>
            <h:inputText id="gName" value="#{groupBean.newGroupName}" required="true" />
        </p>
        <p>
            <h:outputLabel value="Description:" for="gDesc" /><br/>
            <h:inputTextarea id="gDesc" value="#{groupBean.newGroupDescription}" rows="4" cols="50" required="true" />
        </p>
        <p>
            <h:outputLabel value="Privacy Type:" for="gType" /><br/>
            <h:selectOneMenu id="gType" value="#{groupBean.newGroupType}">
                <f:selectItem itemValue="PUBLIC" itemLabel="Public (Anyone can see and join)" />
                <f:selectItem itemValue="PRIVATE" itemLabel="Private (Requires invite - coming soon)" />
            </h:selectOneMenu>
        </p>
        <h:commandButton value="Create Group" action="#{groupBean.createGroup}" />
    </h:form>
</h:body>
</html>
