<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Create Group — FeedBook</ui:define>

    <ui:define name="content">
        <h:link outcome="/groups/list.xhtml" value="Back to Groups" styleClass="fb-back" />

        <h1 class="fb-page-title">Create New Group</h1>
        <hr class="fb-divider" />

        <h:messages globalOnly="true" styleClass="fb-messages" />

        <div class="fb-card" style="max-width:540px;">
            <h:form enctype="multipart/form-data">
                <div class="fb-form-group" style="text-align:center;">
                    <label class="fb-label" for="gPic">Group Picture</label>
                    <div>
                        <img id="preview" style="max-width:120px; display:none; margin:0 auto 12px; border-radius:var(--radius-md); border:2px solid var(--ink-ghost);"/>
                    </div>
                    <h:inputFile id="gPic" value="#{groupBean.newGroupImage}" onchange="previewImage(this)" />
                </div>

                <script>
                    function previewImage(input) {
                        var preview = document.getElementById('preview');
                        if (input.files &amp;&amp; input.files[0]) {
                            var reader = new FileReader();
                            reader.onload = function(e) {
                                preview.src = e.target.result;
                                preview.style.display = 'block';
                            }
                            reader.readAsDataURL(input.files[0]);
                        }
                    }
                </script>

                <div class="fb-form-group">
                    <label class="fb-label" for="gName">Group Name</label>
                    <h:inputText id="gName" value="#{groupBean.newGroupName}" required="true" styleClass="fb-input" />
                </div>

                <div class="fb-form-group">
                    <label class="fb-label" for="gDesc">Description</label>
                    <h:inputTextarea id="gDesc" value="#{groupBean.newGroupDescription}" rows="4" required="true" styleClass="fb-input" />
                </div>

                <div class="fb-form-group">
                    <label class="fb-label" for="gType">Privacy</label>
                    <h:selectOneMenu id="gType" value="#{groupBean.newGroupType}" styleClass="fb-input">
                        <f:selectItem itemValue="PUBLIC" itemLabel="Public — Anyone can see and join" />
                        <f:selectItem itemValue="PRIVATE" itemLabel="Private — Requires approval to join" />
                    </h:selectOneMenu>
                </div>

                <h:commandButton value="Create Group" action="#{groupBean.createGroup}" styleClass="fb-btn fb-btn--primary" />
            </h:form>
        </div>
    </ui:define>
</ui:composition>
