<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:c="jakarta.tags.core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Post — FeedBook</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewParam name="postId" value="#{postBean.postId}" />
            <f:viewAction action="#{postBean.loadPost}" />
        </f:metadata>

        <h:link outcome="/index.xhtml" value="Back to Feed" styleClass="fb-back" />

        <h:messages globalOnly="true" styleClass="fb-messages" />

        <c:choose>
            <c:when test="#{postBean.currentPost == null}">
                <div class="fb-empty">
                    <p class="fb-empty__title">Post not found</p>
                </div>
            </c:when>
            <c:otherwise>
                <div class="fb-post">
                    <div class="fb-post__meta">
                        <h:link outcome="/profile/view.xhtml" styleClass="fb-post__author">
                            <f:param name="userId" value="#{postBean.currentPost.author.id}" />
                            #{postBean.currentPost.author.username}
                        </h:link>
                        <span class="fb-post__separator">·</span>
                        <span class="fb-post__time">
                            <h:outputText value="#{postBean.currentPost.createdAt}">
                                <f:convertDateTime pattern="dd MMM yyyy HH:mm" type="localDateTime"/>
                            </h:outputText>
                        </span>
                    </div>

                    <p class="fb-post__body">#{postBean.currentPost.content}</p>

                    <c:if test="#{not empty postBean.currentPost.imageUrl}">
                        <img src="#{request.contextPath}/resources/#{postBean.currentPost.imageUrl}" class="fb-post__image" />
                    </c:if>

                    <div class="fb-post__actions">
                        <c:if test="#{postBean.canEdit(postBean.currentPost)}">
                            <h:link outcome="/post/edit.xhtml" value="Edit">
                                <f:param name="postId" value="#{postBean.currentPost.id}"/>
                            </h:link>
                        </c:if>
                        <c:if test="#{postBean.canDelete(postBean.currentPost)}">
                            <h:form style="display:inline; margin:0;">
                                <h:commandLink value="Delete"
                                               action="#{postBean.doDeletePost(postBean.currentPost.id)}"
                                               onclick="return confirm('Delete this post?')"
                                               style="color:var(--danger);" />
                            </h:form>
                        </c:if>
                    </div>
                </div>

                <!-- COMMENTS -->
                <h2 class="fb-page-title" style="font-size:1.2rem; margin-top:32px;">
                    Comments (#{postBean.comments.size()})
                </h2>
                <hr class="fb-divider" />

                <c:choose>
                    <c:when test="#{empty postBean.comments}">
                        <p style="color:var(--ink-muted); font-size:0.9rem;">No comments yet. Be the first.</p>
                    </c:when>
                    <c:otherwise>
                        <c:forEach items="#{postBean.comments}" var="comment">
                            <div class="fb-comment">
                                <div class="fb-flex fb-flex--center fb-flex--gap-sm">
                                    <h:link outcome="/profile/view.xhtml" styleClass="fb-comment__author">
                                        <f:param name="userId" value="#{comment.author.id}" />
                                        #{comment.author.username}
                                    </h:link>
                                    <span class="fb-comment__time">
                                        <h:outputText value="#{comment.createdAt}">
                                            <f:convertDateTime pattern="dd MMM yyyy HH:mm" type="localDateTime"/>
                                        </h:outputText>
                                    </span>
                                    <c:if test="#{postBean.canDeleteComment(comment)}">
                                        <h:form style="display:inline; margin:0; margin-left:auto;">
                                            <h:commandLink value="Delete"
                                                           action="#{postBean.doDeleteComment(comment.id)}"
                                                           onclick="return confirm('Delete this comment?')"
                                                           style="color:var(--danger); font-size:0.78rem;" />
                                        </h:form>
                                    </c:if>
                                </div>
                                <p class="fb-comment__body">#{comment.content}</p>
                            </div>
                        </c:forEach>
                    </c:otherwise>
                </c:choose>

                <!-- ADD COMMENT -->
                <div class="fb-card fb-card--flat" style="margin-top:20px;">
                    <h3 style="font-family:var(--font-display); font-size:1rem; margin-bottom:12px;">Add a Comment</h3>
                    <h:form id="commentForm">
                        <h:inputHidden value="#{postBean.postId}" />
                        <div class="fb-form-group">
                            <h:inputTextarea value="#{postBean.newCommentContent}"
                                             rows="3" styleClass="fb-input"
                                             required="true" requiredMessage="Comment cannot be empty." />
                        </div>
                        <h:commandButton value="Comment" action="#{postBean.doAddComment}" styleClass="fb-btn fb-btn--primary" />
                    </h:form>
                </div>
            </c:otherwise>
        </c:choose>
    </ui:define>
</ui:composition>
