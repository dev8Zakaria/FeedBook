<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:c="jakarta.tags.core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Edit Post — FeedBook</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewParam name="postId" value="#{postBean.postId}" />
            <f:viewAction action="#{postBean.loadEditPost}" />
        </f:metadata>

        <h:link outcome="/index.xhtml" value="Back to Feed" styleClass="fb-back" />

        <h:messages globalOnly="true" styleClass="fb-messages" />

        <c:choose>
            <c:when test="#{postBean.currentPost == null}">
                <div class="fb-empty">
                    <p class="fb-empty__title">Post not found</p>
                </div>
            </c:when>
            <c:otherwise>
                <h1 class="fb-page-title">Edit Post</h1>
                <hr class="fb-divider" />

                <div class="fb-card" style="max-width:640px;">
                    <h:form id="editPostForm">
                        <div class="fb-form-group">
                            <label class="fb-label" for="editContent">Content</label>
                            <h:inputTextarea id="editContent" value="#{postBean.editContent}"
                                             rows="6" styleClass="fb-input"
                                             required="true" requiredMessage="Content is required." />
                        </div>
                        <div class="fb-flex fb-flex--gap-sm">
                            <h:commandButton value="Save Changes" action="#{postBean.doEditPost}" styleClass="fb-btn fb-btn--primary" />
                            <h:link outcome="/post/view.xhtml" value="Cancel" styleClass="fb-btn fb-btn--outline">
                                <f:param name="postId" value="#{postBean.postId}"/>
                            </h:link>
                        </div>
                    </h:form>
                </div>
            </c:otherwise>
        </c:choose>
    </ui:define>
</ui:composition>
