<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Edit Profile — FeedBook</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewAction action="#{profileBean.loadProfile}"/>
        </f:metadata>

        <h:link outcome="/profile/view.xhtml" value="Cancel &amp; Go Back" styleClass="fb-back">
            <f:param name="userId" value="#{authBean.currentUser.id}" />
        </h:link>

        <h1 class="fb-page-title">Edit Profile</h1>
        <hr class="fb-divider" />

        <h:messages globalOnly="true" styleClass="fb-messages" />

        <div class="fb-card" style="max-width:500px;">
            <h:form enctype="multipart/form-data">
                <div class="fb-form-group" style="text-align:center;">
                    <label class="fb-label">Current Picture</label>
                    <div style="margin-bottom:12px;">
                        <h:graphicImage value="/resources/#{authBean.currentUser.profilePictureUrl}"
                                        rendered="#{not empty authBean.currentUser.profilePictureUrl}"
                                        styleClass="fb-avatar fb-avatar--lg" />
                        <h:panelGroup rendered="#{empty authBean.currentUser.profilePictureUrl}">
                            <div class="fb-avatar-placeholder" style="width:110px; height:110px; font-size:2.4rem; margin:0 auto;">
                                #{authBean.currentUser.username.substring(0,1).toUpperCase()}
                            </div>
                        </h:panelGroup>
                    </div>
                    <label class="fb-label" for="pfp">Change Picture</label>
                    <h:inputFile id="pfp" value="#{profileBean.newProfileImage}" />
                </div>

                <div class="fb-form-group">
                    <label class="fb-label" for="firstName">First Name</label>
                    <h:inputText id="firstName" value="#{profileBean.firstName}" required="true" styleClass="fb-input" />
                </div>

                <div class="fb-form-group">
                    <label class="fb-label" for="lastName">Last Name</label>
                    <h:inputText id="lastName" value="#{profileBean.lastName}" required="true" styleClass="fb-input" />
                </div>

                <div class="fb-form-group">
                    <label class="fb-label" for="bio">Bio</label>
                    <h:inputTextarea id="bio" value="#{profileBean.bio}" rows="4" styleClass="fb-input" />
                </div>

                <div class="fb-form-group" style="border-top:1px solid var(--ink-ghost); padding-top:16px;">
                    <label class="fb-label" for="pwd">New Password (Optional)</label>
                    <h:inputSecret id="pwd" value="#{profileBean.newPassword}" styleClass="fb-input" />
                    <small style="color:var(--ink-muted); font-size:0.78rem;">Leave blank to keep current password.</small>
                </div>

                <h:commandButton value="Save Changes" action="#{profileBean.saveProfile}" styleClass="fb-btn fb-btn--primary" />
            </h:form>
        </div>
    </ui:define>
</ui:composition>
