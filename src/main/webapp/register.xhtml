<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>FeedBook — Create Account</title>
    <h:outputStylesheet name="css/feedbook.css" />
</h:head>
<h:body styleClass="fb-auth-bg">

    <div class="fb-auth-card">
        <div style="text-align:center; margin-bottom:28px;">
            <span style="font-family: var(--font-display); font-weight:800; font-size:1.6rem; letter-spacing:-0.02em;">
                Feed<span style="color:var(--accent);">Book</span>
            </span>
        </div>

        <h2 class="fb-auth-card__title">Join FeedBook</h2>
        <p class="fb-auth-card__subtitle">Create your account to start sharing.</p>

        <h:messages globalOnly="true" styleClass="fb-messages" />

        <h:form id="registerForm">
            <div class="fb-form-group">
                <label class="fb-label" for="username">Username</label>
                <h:inputText id="username" value="#{authBean.regUsername}" required="true"
                             requiredMessage="Username is required" styleClass="fb-input" />
            </div>

            <div class="fb-form-group">
                <label class="fb-label" for="email">Email Address</label>
                <h:inputText id="email" value="#{authBean.regEmail}" required="true"
                             requiredMessage="Email is required" styleClass="fb-input" />
            </div>

            <div class="fb-form-group">
                <label class="fb-label" for="password">Password</label>
                <h:inputSecret id="password" value="#{authBean.regPassword}" required="true"
                               requiredMessage="Password is required" styleClass="fb-input" />
            </div>

            <h:commandButton value="Create Account" action="#{authBean.doRegister}" styleClass="fb-btn fb-btn--primary fb-btn--block" />
        </h:form>

        <div class="fb-auth-card__footer">
            Already have an account? <h:link outcome="login.xhtml" value="Sign in here" />
        </div>
    </div>

</h:body>
</html>
