<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>My Feed - FeedBook</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .feed-title {
            color: #1c1e21;
            font-size: 24px;
            font-weight: 700;
        }

        .btn-create {
            background-color: #11998e;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-create:hover { background-color: #0d7971; }

        .btn-toggle {
            background-color: #e4e6eb;
            color: #050505;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            margin-right: 10px;
            transition: background 0.2s;
        }
        .btn-toggle:hover { background-color: #d8dadf; }

        .post-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .author-name {
            font-weight: 600;
            color: #050505;
            text-decoration: none;
            display: block;
        }

        .post-date {
            font-size: 13px;
            color: #65676b;
            display: block;
        }

        .post-content {
            font-size: 15px;
            color: #050505;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .post-actions {
            border-top: 1px solid #ced0d4;
            padding-top: 12px;
            display: flex;
            gap: 16px;
        }

        .action-link {
            color: #65676b;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .action-link:hover { text-decoration: underline; }

        .empty-feed {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 8px;
            color: #65676b;
        }
    </style>
</h:head>
<h:body>
    <div class="container">
        
        <div class="header">
            <h1 class="feed-title">My Feed</h1>
            <div>
                <h:link outcome="index.xhtml" value="View Global Feed" styleClass="btn-toggle"/>
                <h:link outcome="/post/new.xhtml" value="Create Post" styleClass="btn-create"/>
            </div>
        </div>

        <ui:fragment rendered="#{empty postBean.followedFeed}">
            <div class="empty-feed">
                <h2>Nothing to see here yet!</h2>
                <p>Follow some users to see their posts appear in your personalized feed.</p>
            </div>
        </ui:fragment>

        <ui:repeat value="#{postBean.followedFeed}" var="post">
            <div class="post-card">
                <div class="post-header">
                    <div>
                        <h:link outcome="/profile/view.xhtml" value="#{post.author.firstName} #{post.author.lastName}" styleClass="author-name">
                            <f:param name="userId" value="#{post.author.id}" />
                        </h:link>
                        <span class="post-date">
                            <h:outputText value="#{post.createdAt}">
                                <f:convertDateTime pattern="MMM d, yyyy 'at' HH:mm" type="localDateTime" />
                            </h:outputText>
                        </span>
                    </div>
                </div>
                
                <div class="post-content">
                    #{post.content}
                </div>

                <div class="post-actions">
                    <h:link outcome="/post/view.xhtml" value="View &amp; Comment" styleClass="action-link">
                        <f:param name="postId" value="#{post.id}" />
                    </h:link>
                </div>
            </div>
        </ui:repeat>

    </div>
</h:body>
</html>
